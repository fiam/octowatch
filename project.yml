name: Octowatch
options:
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: dev.octowatch.app
    SWIFT_VERSION: 6.0
packages:
  Yams:
    url: https://github.com/jpsim/Yams
    from: 6.2.1
targets:
  GitHubWorkflowParsing:
    type: framework
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/GitHubWorkflowParsing
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - package: Yams
  Octowatch:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Octobar
    dependencies:
      - target: GitHubWorkflowParsing
    settings:
      base:
        PRODUCT_NAME: Octowatch
        INFOPLIST_FILE: Octobar/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
  OctowatchTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/OctobarTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Octowatch
      - target: GitHubWorkflowParsing
  OctowatchUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/OctowatchUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Octowatch
    dependencies:
      - target: Octowatch
schemes:
  Octowatch:
    build:
      targets:
        Octowatch: all
    test:
      targets:
        - name: OctowatchTests
    run:
      config: Debug
  OctowatchUI:
    build:
      targets:
        Octowatch: all
    test:
      targets:
        - name: OctowatchUITests
    run:
      config: Debug
