name: Octowatch
options:
  createIntermediateGroups: true
  developmentLanguage: en-US
attributes:
  TargetAttributes:
    Octowatch:
      DevelopmentTeam: ${OCTOWATCH_DEVELOPMENT_TEAM}
      ProvisioningStyle: Automatic
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: app.octowatch.macos
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    SPARKLE_PUBLIC_ED_KEY: NhQU/p4gwGIa0MO3rrdje2zJfzcQrJsUT19rOnxHB7k=
    SWIFT_VERSION: 6
packages:
  Yams:
    url: https://github.com/jpsim/Yams
    from: 6.2.1
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.1
targets:
  GitHubWorkflowParsing:
    type: framework
    platform: macOS
    deploymentTarget: '26.0'
    sources:
      - path: Sources/GitHubWorkflowParsing
    settings:
      base:
        GENERATE_INFOPLIST_FILE: 'YES'
    dependencies:
      - package: Yams
  Octowatch:
    type: application
    platform: macOS
    deploymentTarget: '26.0'
    sources:
      - path: Sources/Octobar
    dependencies:
      - target: GitHubWorkflowParsing
      - package: Sparkle
    settings:
      base:
        PRODUCT_NAME: Octowatch
        INFOPLIST_FILE: Octobar/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ${OCTOWATCH_DEVELOPMENT_TEAM}
        ENABLE_HARDENED_RUNTIME: 'YES'
      configs:
        Release:
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: 'NO'
  OctowatchTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: '26.0'
    sources:
      - path: Tests/OctobarTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: 'YES'
    dependencies:
      - target: Octowatch
      - target: GitHubWorkflowParsing
  OctowatchUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: '26.0'
    sources:
      - path: Tests/OctowatchUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: 'YES'
        TEST_TARGET_NAME: Octowatch
    dependencies:
      - target: Octowatch
schemes:
  Octowatch:
    build:
      targets:
        Octowatch: all
    test:
      targets:
        - name: OctowatchTests
    run:
      config: Debug
  OctowatchUI:
    build:
      targets:
        Octowatch: all
    test:
      targets:
        - name: OctowatchUITests
    run:
      config: Debug
