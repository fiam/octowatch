name: Octowatch
options:
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: dev.octowatch.app
    SWIFT_VERSION: 6.0
targets:
  Octowatch:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Octobar
    settings:
      base:
        PRODUCT_NAME: Octowatch
        INFOPLIST_FILE: Octobar/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
  OctowatchTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/OctobarTests
    dependencies:
      - target: Octowatch
schemes:
  Octowatch:
    build:
      targets:
        Octowatch: all
    test:
      targets:
        - name: OctowatchTests
    run:
      config: Debug
