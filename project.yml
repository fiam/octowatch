name: Octobar
options:
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: dev.octobar.app
    SWIFT_VERSION: 6.0
targets:
  Octobar:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Octobar
    settings:
      base:
        PRODUCT_NAME: Octobar
        INFOPLIST_FILE: Octobar/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
  OctobarTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/OctobarTests
    dependencies:
      - target: Octobar
schemes:
  Octobar:
    build:
      targets:
        Octobar: all
    test:
      targets:
        - name: OctobarTests
    run:
      config: Debug
