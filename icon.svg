<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="50%" stop-color="#7b68ee"/>
      <stop offset="100%" stop-color="#ff6bcb"/>
    </linearGradient>
    <linearGradient id="shield" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7b68ee" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect (macOS icon shape) -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <!-- Shield shape -->
  <path d="M512 140 L780 260 L780 520 Q780 700 512 860 Q244 700 244 520 L244 260 Z"
        fill="url(#shield)" stroke="url(#glow)" stroke-width="6"/>

  <!-- Octopus eye (center) -->
  <circle cx="512" cy="400" r="64" fill="none" stroke="url(#glow)" stroke-width="8"/>
  <circle cx="512" cy="400" r="28" fill="#00d2ff"/>
  <circle cx="512" cy="400" r="12" fill="#1a1a2e"/>

  <!-- Concentric radar rings -->
  <circle cx="512" cy="400" r="110" fill="none" stroke="#00d2ff" stroke-width="3" opacity="0.4"/>
  <circle cx="512" cy="400" r="160" fill="none" stroke="#7b68ee" stroke-width="2" opacity="0.25"/>

  <!-- Tentacles (6 flowing lines) -->
  <!-- Left tentacles -->
  <path d="M448 460 Q380 540 310 600 Q280 630 300 660" fill="none" stroke="url(#glow)" stroke-width="10" stroke-linecap="round"/>
  <path d="M470 475 Q420 580 370 680 Q350 720 380 740" fill="none" stroke="url(#glow)" stroke-width="10" stroke-linecap="round"/>
  <path d="M500 490 Q490 600 470 720 Q465 760 490 770" fill="none" stroke="url(#glow)" stroke-width="10" stroke-linecap="round"/>

  <!-- Right tentacles -->
  <path d="M576 460 Q644 540 714 600 Q744 630 724 660" fill="none" stroke="url(#glow)" stroke-width="10" stroke-linecap="round"/>
  <path d="M554 475 Q604 580 654 680 Q674 720 644 740" fill="none" stroke="url(#glow)" stroke-width="10" stroke-linecap="round"/>
  <path d="M524 490 Q534 600 554 720 Q559 760 534 770" fill="none" stroke="url(#glow)" stroke-width="10" stroke-linecap="round"/>

  <!-- Tentacle tips (dots) -->
  <circle cx="300" cy="660" r="8" fill="#ff6bcb"/>
  <circle cx="380" cy="740" r="8" fill="#ff6bcb"/>
  <circle cx="490" cy="770" r="8" fill="#7b68ee"/>
  <circle cx="724" cy="660" r="8" fill="#ff6bcb"/>
  <circle cx="644" cy="740" r="8" fill="#ff6bcb"/>
  <circle cx="534" cy="770" r="8" fill="#7b68ee"/>

  <!-- Circuit-like nodes on tentacles -->
  <circle cx="380" cy="540" r="6" fill="#00d2ff"/>
  <circle cx="644" cy="540" r="6" fill="#00d2ff"/>
  <circle cx="420" cy="580" r="5" fill="#7b68ee"/>
  <circle cx="604" cy="580" r="5" fill="#7b68ee"/>
</svg>
