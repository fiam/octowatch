<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="base" x1="150" y1="120" x2="884" y2="904" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2A3E64"/>
      <stop offset="0.45" stop-color="#1E2E4D"/>
      <stop offset="1" stop-color="#131F35"/>
    </linearGradient>
    <radialGradient id="ambient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(310 242) rotate(30) scale(694)">
      <stop offset="0" stop-color="#8BC7FF" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#8BC7FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="284" y1="248" x2="744" y2="774" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#75B8F8" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#2D537D" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="tray" x1="700" y1="531" x2="886" y2="596" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE29E"/>
      <stop offset="1" stop-color="#F5B949"/>
    </linearGradient>
    <linearGradient id="outline" x1="418" y1="238" x2="648" y2="814" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FCFEFF"/>
      <stop offset="1" stop-color="#D9E9F7"/>
    </linearGradient>
    <filter id="outerShadow" x="48" y="48" width="928" height="928" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#06101D" flood-opacity="0.42"/>
    </filter>
    <filter id="glyphShadow" x="224" y="178" width="680" height="690" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="10" flood-color="#06101D" flood-opacity="0.4"/>
    </filter>
  </defs>

  <g filter="url(#outerShadow)">
    <rect x="64" y="64" width="896" height="896" rx="206" fill="url(#base)"/>
    <rect x="64" y="64" width="896" height="896" rx="206" fill="url(#ambient)"/>
    <rect x="64" y="64" width="896" height="896" rx="206" stroke="#CDE3FF" stroke-opacity="0.22" stroke-width="2"/>
  </g>

  <circle cx="512" cy="526" r="284" fill="#0D1626" fill-opacity="0.52"/>
  <circle cx="512" cy="526" r="283" stroke="url(#ring)" stroke-width="10"/>

  <g filter="url(#glyphShadow)">
    <!-- head + ears -->
    <path d="M426 353L454 282L503 337" stroke="url(#outline)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M598 353L571 282L522 337" stroke="url(#outline)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M378 416C378 333 441 287 512 287C583 287 646 333 646 416C646 492 587 547 512 547C437 547 378 492 378 416Z" stroke="url(#outline)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- body -->
    <path d="M451 574C451 546 473 524 501 524H523C551 524 573 546 573 574V756C573 778 555 796 533 796H491C469 796 451 778 451 756V574Z"
      stroke="url(#outline)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- left tentacle -->
    <path d="M468 766C430 801 363 801 334 761C304 720 315 656 365 644C337 687 350 727 390 739C413 746 439 744 463 733"
      stroke="url(#outline)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- serving arm -->
    <path d="M572 621C629 590 700 572 776 574" stroke="url(#outline)" stroke-width="34" stroke-linecap="round"/>

    <!-- tray -->
    <path d="M733 548C772 540 845 540 886 548" stroke="url(#tray)" stroke-width="20" stroke-linecap="round"/>
    <ellipse cx="891" cy="548" rx="10" ry="6.5" fill="#F9CA65"/>
  </g>

  <!-- subtle glass highlight -->
  <path d="M146 194C221 118 356 96 512 96C674 96 810 121 878 198" stroke="#F8FCFF" stroke-opacity="0.26" stroke-width="18" stroke-linecap="round"/>
</svg>
